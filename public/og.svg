<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05080d"/>
      <stop offset="100%" stop-color="#0a0f17"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.1" r="0.5">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="40%" stop-color="#5eead4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1b2533" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.7"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- meridian wave -->
  <path d="M 0 430 Q 200 350, 400 430 T 800 430 T 1200 430"
        fill="none" stroke="url(#wave)" stroke-width="2.5"/>
  <path d="M 0 470 Q 200 400, 400 470 T 800 470 T 1200 470"
        fill="none" stroke="#5eead4" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="900" cy="430" r="6" fill="#5eead4"/>
  <circle cx="900" cy="430" r="14" fill="none" stroke="#5eead4" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- logo mark -->
  <g transform="translate(80, 90)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#5eead4" stroke-width="2"/>
    <circle cx="20" cy="20" r="6" fill="#5eead4"/>
    <text x="56" y="27" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" font-weight="600" fill="#cbd5e1" letter-spacing="2">
      SIGNAL MERIDIAN
    </text>
  </g>

  <!-- status pill removed -->

  <!-- main headline -->
  <text x="80" y="280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="600" fill="#ffffff" letter-spacing="-1.5">
    Senior technical assistance
  </text>
  <text x="80" y="350" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="58" font-weight="300" fill="#cbd5e1" letter-spacing="-1">
    for systems that need to <tspan fill="#5eead4" font-weight="500">scale</tspan>.
  </text>

  <!-- three offer chips -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="15" fill="#cbd5e1">
    <g transform="translate(80, 520)">
      <rect width="290" height="46" rx="10" fill="#0a0f17" stroke="#1b2533"/>
      <circle cx="22" cy="23" r="4" fill="#5eead4"/>
      <text x="40" y="29">Server infrastructure</text>
    </g>
    <g transform="translate(390, 520)">
      <rect width="240" height="46" rx="10" fill="#0a0f17" stroke="#1b2533"/>
      <circle cx="22" cy="23" r="4" fill="#5eead4"/>
      <text x="40" y="29">Agentic flows</text>
    </g>
    <g transform="translate(650, 520)">
      <rect width="290" height="46" rx="10" fill="#0a0f17" stroke="#1b2533"/>
      <circle cx="22" cy="23" r="4" fill="#5eead4"/>
      <text x="40" y="29">Developer relations</text>
    </g>
  </g>

  <!-- url -->
  <text x="1120" y="600" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#5eead4" letter-spacing="1">
    signalmeridian.io
  </text>
</svg>
